<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Experiment</title>
</head>
<body>
    <h1>Image Create</h1>
    <br>

    <img id="Image" 
         src="https://static.vecteezy.com/system/resources/thumbnails/057/068/323/small/single-fresh-red-strawberry-on-table-green-background-food-fruit-sweet-macro-juicy-plant-image-photo.jpg">

    <br><br>

    <button id="btn" onclick="switchImage()">Switch Image</button>

<script>
function switchImage() {
  const img = document.getElementById("Image");

  const img1 = "https://static.vecteezy.com/system/resources/thumbnails/057/068/323/small/single-fresh-red-strawberry-on-table-green-background-food-fruit-sweet-macro-juicy-plant-image-photo.jpg";

  const img2 = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTeueac4mTHvAJHjaFLrmI8T70PQEh84rPf7O8rDlOoHy304omLimPrFpn8s8opYCXgPMmvT_nZUUrbDycGYbF477aE_ekz&s";

  // Toggle image
  if (img.src === img1) {
    img.src = img2;
  } else {
    img.src = img1;
  }
}
</script>

</body>
</html>
