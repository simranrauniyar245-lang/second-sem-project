<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }
        input {
            margin: 5px;
            padding: 8px;
        }
        button {
            padding: 10px 20px;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>Student Result System</h2>

    <input type="number" id="sub1" placeholder="Subject 1 Marks"><br>
    <input type="number" id="sub2" placeholder="Subject 2 Marks"><br>
    <input type="number" id="sub3" placeholder="Subject 3 Marks"><br>
    <input type="number" id="sub4" placeholder="Subject 4 Marks"><br>
    <input type="number" id="sub5" placeholder="Subject 5 Marks"><br>

    <button onclick="calculateResult()">Calculate Result</button>

    <div id="result"></div>

    <script>
        function calculateResult() {
            let s1 = Number(document.getElementById("sub1").value);
            let s2 = Number(document.getElementById("sub2").value);
            let s3 = Number(document.getElementById("sub3").value);
            let s4 = Number(document.getElementById("sub4").value);
            let s5 = Number(document.getElementById("sub5").value);

            let total = s1 + s2 + s3 + s4 + s5;
            let percentage = total / 5;

            let grade;

            if (percentage >= 75) {
                grade = "Distinction";
            } 
            else if (percentage >= 60) {
                grade = "First Class";
            } 
            else if (percentage >= 50) {
                grade = "Second Class";
            } 
            else {
                grade = "Fail";
            }

            document.getElementById("result").innerHTML =
                "Total Marks: " + total + "<br>" +
                "Percentage: " + percentage.toFixed(2) + "%<br>" +
                "Result: " + grade;
        }
    </script>

</body>
</html>
