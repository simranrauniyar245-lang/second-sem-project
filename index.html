<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>

    <style id="css1">
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px;
        }

        .delete {
            margin-left: 10px;
            color: white;
            background: red;
            border: none;
        }
    </style>
</head>
<body>

    <h1>To-Do List</h1>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button id="addBtn">Add</button>

    <p>Total Tasks: <span id="count">0</span></p>

    <ul id="taskList"></ul>

    <script src="script.js"></script>

</body>
</html>
