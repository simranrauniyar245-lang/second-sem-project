<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Experiment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="heading">Welcome to My Page</h1>

    <p id="para">This is a sample paragraph. You can change me!</p>

    <input type="text" id="inputText" placeholder="Enter new heading text">

    <br><br>

    <button id="btnText">Change Heading</button>
    <button id="btnColor">Change Background</button>
    <button id="btnSize">Increase Font Size</button>
    <button id="btnToggle">Show/Hide Paragraph</button>

    <script src="script.js"></script>

</body>
</html>
